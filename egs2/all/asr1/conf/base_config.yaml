# Trained with NVIDIA V100 GPU (32GB) x 4

frontend_conf:
    n_fft: 512
    win_length: 400
    hop_length: 160

seed: 2022
use_amp: true
num_workers: 4
batch_type: numel
batch_bins: 10000000
accum_grad: 1
max_epoch: 50
init: none
keep_nbest_models: 50

optim: adam
optim_conf:
    lr: 0.002
    weight_decay: 0.000001
scheduler: warmuplr
scheduler_conf:
    warmup_steps: 100000

specaug: specaug
specaug_conf:
    apply_time_warp: true
    time_warp_window: 5
    time_warp_mode: bicubic
    apply_freq_mask: true
    freq_mask_width_range:
    - 0
    - 27
    num_freq_mask: 2
    apply_time_mask: true
    time_mask_width_ratio_range:
    - 0.
    - 0.05
    num_time_mask: 5
