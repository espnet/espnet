# BEATs base tokenizer (VQ-KD) training on AudioSet-2M (arXiv:2212.09058, Table 4).
# fbank_mean/std are corpus stats over the AS-2M train set (computed by stage 4).
init: none
patience: none
best_model_criterion:
-   - valid
    - loss
    - min
keep_nbest_models: 1
num_att_plot: 0

model_conf:
    waveform_input: false

encoder_conf:
    tokenizer_config:
        embed_loss_beta: 10.0
        layer_wise_gradient_decay_ratio: 1.0
        encoder_layerdrop: 0.0
        dropout: 0.1
        codebook_vocab_size: 1024  # keep in sync with n_targets in run.sh
        fbank_mean: 15.66439
        fbank_std: 6.38312
        decoder_layers: 3
        deep_norm: true
        use_flash_attn: false
        relative_position_embedding: true
        num_buckets: 320
        max_distance: 800
        gru_rel_pos: true

freeze_param: ["teacher"]

# batch_bins: per-GPU frame budget (speech only, so no target-token term).
# ~28.7K steps/epoch; 14 epochs ≈ the paper's 400K-step schedule (see README).
batch_type: length
batch_bins: 70000
max_epoch: 14

num_workers: 4
use_deepspeed: true
deepspeed_config: conf/ds_beats_tok.json
