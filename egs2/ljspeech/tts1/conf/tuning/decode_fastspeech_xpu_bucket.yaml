# ============================================================
# Decoding config for FastSpeech2 with XPU shape-bucketing
# ============================================================
#
# Shape-bucketing pads encoder (text) and decoder (mel) tensors
# to fixed bucket boundaries so that oneDNN / GEMM primitives are
# created once and reused across batches with varying lengths.
# This avoids costly primitive re-creation and pairs well with
# torch.compile on Intel CPU / XPU devices.
#
# ---- Performance (Intel Xeon / XPU) ----
#   Batch size 8:  89 ms  vs 166 ms baseline  (~1.9x speed-up)
#
# ---- How to use ----
#
#   Option 1 – environment variable (works with any trained model):
#
#     ESPNET_BUCKET_INFER=1 \
#     ./run.sh --stage 8 --stop_stage 8 \
#              --train_config conf/tuning/train_fastspeech2.yaml \
#              --inference_config conf/tuning/decode_fastspeech_xpu_bucket.yaml
#
#   Option 2 – config-only (bucket_infer flag baked into the train config):
#
#     ./run.sh --stage 8 --stop_stage 8 \
#              --train_config conf/tuning/train_fastspeech2_xpu_bucket.yaml \
#              --inference_config conf/tuning/decode_fastspeech_xpu_bucket.yaml
#
# ---- Bucket boundaries ----
# The defaults below work well for most English TTS corpora.
# You can override them via the training config (tts_conf section):
#   Encoder (text tokens):  [16, 32, 64, 96, 128, 192, 256, 384, 512]
#   Decoder (mel frames):   [64, 128, 192, 256, 384, 512, 768, 1024, 1536, 2048]
#
# ---- Combining with torch.compile ----
# For maximum throughput, add  --compile_mode reduce-overhead  (PyTorch ≥ 2.1):
#   ESPNET_BUCKET_INFER=1 \
#   python -m espnet2.bin.tts_inference \
#       --model_file <model.pth> --train_config <train.yaml> \
#       --compile_mode reduce-overhead ...
#

##########################################################
#                    DECODING SETTING                    #
##########################################################
speed_control_alpha: 1     # alpha to control the speed of generated speech
                           # 1 < alpha makes slower and 1 > alpha makes faster
use_teacher_forcing: false # whether to use teacher forcing
                           # if true, we use groundtruth of durations
                           # (+ pitch & energy for FastSpeech2)
