##########################################################
#                 Mini AN4 VITS Debug Run               #
##########################################################
exp_tag: train_vits_debug
task: espnet2.tasks.gan_tts.GANTTSTask

dataset:
  recipe_dir: ${recipe_dir}
  train:
    - data_src_args:
        split: train
  valid:
    - data_src_args:
        split: valid
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    fs: 16000
    train: true
    token_type: char
    token_list: ${data_dir}/tokens.txt

create_dataset:
  recipe_dir: ${recipe_dir}

model:
  token_list: ${data_dir}/tokens.txt
  token_type: char
  feats_extract: linear_spectrogram
  feats_extract_conf:
    n_fft: 1024
    hop_length: 64
  normalize: null
  tts: vits
  tts_conf:
    generator_type: vits_generator
    generator_params:
      hidden_channels: 8
      spks: -1
      global_channels: 8
      segment_size: 16
      text_encoder_attention_heads: 1
      text_encoder_ffn_expand: 1
      text_encoder_blocks: 1
      text_encoder_positionwise_layer_type: conv1d
      text_encoder_positionwise_conv_kernel_size: 3
      text_encoder_positional_encoding_layer_type: rel_pos
      text_encoder_self_attention_layer_type: rel_selfattn
      text_encoder_activation_type: swish
      text_encoder_normalize_before: true
      text_encoder_dropout_rate: 0.1
      text_encoder_positional_dropout_rate: 0.0
      text_encoder_attention_dropout_rate: 0.1
      use_macaron_style_in_text_encoder: true
      use_conformer_conv_in_text_encoder: false
      text_encoder_conformer_kernel_size: -1
      decoder_kernel_size: 3
      decoder_channels: 16
      decoder_upsample_scales: [8, 8]
      decoder_upsample_kernel_sizes: [16, 16]
      decoder_resblock_kernel_sizes: [3]
      decoder_resblock_dilations: [[1, 3]]
      use_weight_norm_in_decoder: true
      posterior_encoder_kernel_size: 5
      posterior_encoder_layers: 1
      posterior_encoder_stacks: 1
      posterior_encoder_base_dilation: 1
      posterior_encoder_dropout_rate: 0.0
      use_weight_norm_in_posterior_encoder: true
      flow_flows: 1
      flow_kernel_size: 3
      flow_base_dilation: 1
      flow_layers: 1
      flow_dropout_rate: 0.0
      use_weight_norm_in_flow: true
      use_only_mean_in_flow: true
      stochastic_duration_predictor_kernel_size: 3
      stochastic_duration_predictor_dropout_rate: 0.5
      stochastic_duration_predictor_flows: 1
      stochastic_duration_predictor_dds_conv_layers: 1
    discriminator_type: hifigan_multi_scale_multi_period_discriminator
    discriminator_params:
      scales: 1
      scale_downsample_pooling: AvgPool1d
      scale_downsample_pooling_params:
        kernel_size: 2
        stride: 1
        padding: 1
      scale_discriminator_params:
        in_channels: 1
        out_channels: 1
        kernel_sizes: [3, 3, 1, 1]
        channels: 8
        max_downsample_channels: 16
        max_groups: 2
        bias: true
        downsample_scales: [2, 2]
        nonlinear_activation: LeakyReLU
        nonlinear_activation_params:
          negative_slope: 0.1
        use_weight_norm: true
        use_spectral_norm: false
      follow_official_norm: false
      periods: [2]
      period_discriminator_params:
        in_channels: 1
        out_channels: 1
        kernel_sizes: [3, 3]
        channels: 8
        downsample_scales: [3, 3]
        max_downsample_channels: 16
        bias: true
        nonlinear_activation: LeakyReLU
        nonlinear_activation_params:
          negative_slope: 0.1
        use_weight_norm: true
        use_spectral_norm: false
    generator_adv_loss_params:
      average_by_discriminators: false
      loss_type: mse
    discriminator_adv_loss_params:
      average_by_discriminators: false
      loss_type: mse
    feat_match_loss_params:
      average_by_discriminators: false
      average_by_layers: false
      include_final_outputs: true
    mel_loss_params:
      fs: 16000
      n_fft: 1024
      hop_length: 64
      win_length: null
      window: hann
      n_mels: 80
      fmin: 0
      fmax: null
      log_base: null
    lambda_adv: 1.0
    lambda_mel: 45.0
    lambda_feat_match: 2.0
    lambda_dur: 1.0
    lambda_kl: 1.0
    sampling_rate: 16000
    cache_generator_outputs: true
    plot_pred_mos: false
    mos_pred_tool: utmos

optimizers:
  generator:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 0.0002
      betas: [0.8, 0.99]
      eps: 1.0e-9
      weight_decay: 0.0
    params: generator
    accum_grad_steps: 1
    step_every_n_iters: 1
  discriminator:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 0.0002
      betas: [0.8, 0.99]
      eps: 1.0e-9
      weight_decay: 0.0
    params: discriminator
    accum_grad_steps: 1
    step_every_n_iters: 1

schedulers:
  generator:
    scheduler:
      _target_: torch.optim.lr_scheduler.ExponentialLR
      gamma: 0.999875
    interval: epoch
  discriminator:
    scheduler:
      _target_: torch.optim.lr_scheduler.ExponentialLR
      gamma: 0.999875
    interval: epoch

best_model_criterion:
  - - valid/generator/loss
    - 1
    - min

optimizer: null
scheduler: null
scheduler_interval: null

dataloader:
  train:
    iter_factory: null
    batch_size: 1
    shuffle: true
    num_workers: 0
  valid:
    iter_factory: null
    batch_size: 1
    shuffle: false
    num_workers: 0

trainer:
  gradient_clip_val: null
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 1
  strategy: auto
