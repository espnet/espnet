##########################################################
#              Mini AN4 Tacotron2 Debug Run             #
##########################################################
exp_tag: train_tacotron2_debug
task: espnet2.tasks.tts.TTSTask

dataset:
  recipe_dir: ${recipe_dir}
  train:
    - data_src_args:
        split: train
  valid:
    - data_src_args:
        split: valid
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    fs: 16000
    train: true
    token_type: char
    token_list: ${data_dir}/tokens.txt

create_dataset:
  recipe_dir: ${recipe_dir}

model:
  token_list: ${data_dir}/tokens.txt
  token_type: char
  feats_extract: fbank
  feats_extract_conf:
    n_fft: 2048
    win_length: 1024
    hop_length: 256
    fs: 16000
    fmin: 80
    fmax: 7600
    n_mels: 80
  normalize: null
  tts: tacotron2
  tts_conf:
    embed_dim: 2
    elayers: 1
    eunits: 2
    econv_layers: 1
    econv_chans: 2
    econv_filts: 3
    atype: location
    adim: 2
    aconv_chans: 2
    aconv_filts: 3
    cumulate_att_w: true
    dlayers: 1
    dunits: 2
    prenet_layers: 2
    prenet_units: 2
    postnet_layers: 2
    postnet_chans: 2
    postnet_filts: 3
    output_activation: null
    use_batch_norm: true
    use_concate: true
    use_residual: false
    dropout_rate: 0.5
    zoneout_rate: 0.1
    reduction_factor: 1
    spk_embed_dim: null
    use_masking: true
    bce_pos_weight: 5.0
    use_guided_attn_loss: true
    guided_attn_loss_sigma: 0.4
    guided_attn_loss_lambda: 1.0

trainer:
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 1
  strategy: auto

dataloader:
  train:
    batch_size: 1
