##########################################################
#                    TRAINING SETTING                    #
##########################################################
# This is a debug config for CI.
# Mini AN4 LM-RNN training config for ESPnet3 integration tests.

##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
task: espnet3.systems.asr.task.ASRTask

exp_tag: train_lm_rnn_debug
dataset_dir: ${data_dir}/mini_an4

##########################################################
#                 DATASET CREATION SETTING               #
##########################################################
create_dataset:
  func: src.creating_dataset.create_dataset
  dataset_dir: ${dataset_dir}
  archive_path: ${recipe_dir}/../../egs2/mini_an4/asr1/downloads.tar.gz

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Reuse the ASR manifests and tokenize the transcript text for LM training.
dataset:
  train:
    - name: train_nodev
      dataset:
        _target_: src.dataset.MiniAN4Dataset
        manifest_path: ${dataset_dir}/manifest/train_nodev.tsv
  valid:
    - name: train_dev
      dataset:
        _target_: src.dataset.MiniAN4Dataset
        manifest_path: ${dataset_dir}/manifest/train_dev.tsv
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    train: true
    token_type: bpe
    token_list: ${tokenizer.save_path}/tokens.txt
    bpemodel: ${tokenizer.save_path}/bpe.model
    text_cleaner:

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
tokenizer:
  vocab_size: 30
  character_coverage: 1.0
  model_type: bpe
  save_path: ${data_dir}/${tokenizer.model_type}_${tokenizer.vocab_size}
  text_builder:
    func: src.tokenizer.gather_training_text
    manifest_path: ${dataset_dir}/manifest/train_nodev.tsv

##########################################################
#                      MODEL SETTING                     #
##########################################################
# Tiny recurrent LM for debug-only language-model coverage.
model:
  vocab_size: ${tokenizer.vocab_size}
  token_list: ${tokenizer.save_path}/tokens.txt

  lm_conf:
    nlayers: 1
    unit: 2

  normalize: utterance_mvn
  normalize_conf: {}

  model: espnet
  model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

  frontend: default
  frontend_conf:
    n_fft: 512
    win_length: 400
    hop_length: 160

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
optimizer:
  lr: 0.005

scheduler:
  warmup_steps: 30000

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
# Xavier init is kept to match the other debug baselines.
init: xavier_uniform

best_model_criterion:
  - - valid/acc
    - 10
    - max

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
# Larger batches are fine here because the LM input is text-only.
dataloader:
  train:
    iter_factory:
      batches:
        type: sorted
        batch_size: 32

##########################################################
#                    TRAINER SETTING                     #
##########################################################
trainer:
  log_every_n_steps: 1
  max_epochs: 100
  limit_train_batches: 1
  limit_val_batches: 1

  strategy: auto
