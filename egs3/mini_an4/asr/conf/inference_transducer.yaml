##########################################################
#                   Inference SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages infer --inference_config conf/inference.yaml
#
##########################################################
#                    PATHS AND INPUTS                    #
##########################################################

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Each test entry is a dataset reference consumed by `DataOrganizer`.
# - `name` becomes `${inference_dir}/<name>/`
# - `data_src` is omitted, so ESPnet3 loads
#   `${recipe_dir}/dataset/__init__.py`
# - `data_src_args` is passed directly to `MiniAn4Dataset(...)`
#
# Dataset splits:
#   test:
#     - split="test" from `MiniAn4Dataset`
# Notes:
#   - actual data sources are defined via `${recipe_dir}`
dataset:
  test:
    - name: test
      data_src_args:
        split: test

##########################################################
#                    MODEL AND OUTPUT                    #
##########################################################
model:
  _target_: espnet2.bin.asr_transducer_inference.Speech2Text
  asr_train_config: ${exp_dir}/config.yaml
  asr_model_file: ${exp_dir}/last.ckpt
  beam_size: 1

input_key: speech
output_fn: src.inference.build_output_transducer
