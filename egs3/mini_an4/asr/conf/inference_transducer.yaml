##########################################################
#                   Inference SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages infer --inference_config conf/inference.yaml
#
# Mini AN4 ASR inference config for ESPnet3 integration tests.
##########################################################
#                    PATHS AND INPUTS                    #
##########################################################
exp_dir: ${load_yaml:training.yaml,exp_dir}
inference_dir: ${exp_dir}/inference
dataset_dir: ${load_yaml:training.yaml,dataset_dir}

dataset:
  test:
    - name: test
      dataset:
        _target_: src.dataset.MiniAN4Dataset
        manifest_path: ${dataset_dir}/manifest/test.tsv

##########################################################
#                    MODEL AND OUTPUT                    #
##########################################################
model:
  _target_: espnet2.bin.asr_transducer_inference.Speech2Text
  asr_training_config: ${exp_dir}/config.yaml
  asr_model_file: ${exp_dir}/last.ckpt
  beam_size: 1

input_key: speech
output_fn: src.inference.build_output_transducer
