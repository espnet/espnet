##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/<name>.yaml
#   python run.py --stages train          --training_config conf/<name>.yaml
#
##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
task: espnet3.systems.asr.task.ASRTask

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Each entry below is a dataset reference consumed by `DataOrganizer`.
# - `data_src` is omitted, so ESPnet3 loads `${recipe_dir}/dataset/__init__.py`
#   and instantiates its exported recipe dataset class.
# - `data_src_args` is passed directly to `Dataset(...)`.
# - top-level keys such as `transform` stay in organizer space and are not
#   forwarded to `Dataset(...)`.
#
# Dataset splits:
#   train:
#     - split="train" from the recipe dataset
#   valid:
#     - split="valid" from the recipe dataset
# Notes:
#   - actual data sources are defined via `${recipe_dir}`
dataset:
  train:
    - data_src_args:
        split: train
  valid:
    - data_src_args:
        split: valid
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    fs: 16000
    train: true
    data_aug_effects:   # no need to set the "sample_rate" argument for each effect here
        - [0.1, "contrast", {"enhancement_amount": 75.0}]
        - [0.1, "highpass", {"cutoff_freq": 5000, "Q": 0.707}]
        - [0.1, "equalization", {"center_freq": 1000, "gain": 0, "Q": 0.707}]
        - - 0.1
          - - [0.3, "speed_perturb", {"factor": 0.9}]
            - [0.3, "speed_perturb", {"factor": 1.1}]
            - [0.3, "speed_perturb", {"factor": 1.3}]
    data_aug_num: [1, 4]
    data_aug_prob: 1.0
    token_type: bpe
    token_list: ${tokenizer.save_path}/tokens.txt
    bpemodel: ${tokenizer.save_path}/bpe.model

create_dataset:
  recipe_dir: ${recipe_dir}

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
tokenizer:
  vocab_size: 30
  character_coverage: 1.0
  model_type: bpe
  save_path: ${data_dir}/${tokenizer.model_type}_${tokenizer.vocab_size}
  text_builder:
    func: src.tokenizer.gather_training_text
    manifest_path: ${data_dir}/manifest/train.tsv

##########################################################
#                      MODEL SETTING                     #
##########################################################
# Tiny transformer encoder/decoder pair to keep CI fast.
model:
  vocab_size: ${tokenizer.vocab_size}
  token_list: ${tokenizer.save_path}/tokens.txt

  encoder: transformer
  encoder_conf:
    output_size: 2
    attention_heads: 2
    linear_units: 2
    num_blocks: 2
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    input_layer: conv1d2
    normalize_before: true

  decoder: transformer
  decoder_conf:
    attention_heads: 2
    linear_units: 2
    num_blocks: 2
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.0
    src_attention_dropout_rate: 0.0

  normalize: utterance_mvn
  normalize_conf: {}

  model: espnet
  model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

  frontend: default
  frontend_conf:
    n_fft: 512
    win_length: 400
    hop_length: 160

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
optimizer:
  lr: 0.005

scheduler:
  warmup_steps: 100

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
# Xavier init is used to stabilize this transformer baseline.
init: xavier_uniform

best_model_criterion:
  - - valid/loss
    - 10
    - min

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  train:
    iter_factory:
      batches:
        type: unsorted
        batch_size: 2

##########################################################
#                    TRAINER SETTING                     #
##########################################################
trainer:
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 1

  strategy: auto
