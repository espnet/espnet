##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/training.yaml
#   python run.py --stages train          --training_config conf/training.yaml
#
##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
task: espnet3.systems.asr.task.ASRTask

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Each entry below is a dataset reference consumed by `DataOrganizer`.
# - `data_src` is omitted, so ESPnet3 loads `${recipe_dir}/dataset/__init__.py`
#   and instantiates its exported `Dataset` class (`MiniAn4Dataset` here).
# - `data_src_args` is passed directly to `Dataset(...)`.
# - top-level keys such as `transform` stay in organizer space and are not
#   forwarded to `Dataset(...)`.
#
# Dataset splits:
#   train:
#     - split="train" from `MiniAn4Dataset`
#   valid:
#     - split="valid" from `MiniAn4Dataset`
# Notes:
#   - actual data sources are defined via `${recipe_dir}`
dataset:
  train:
    - data_src_args:
        split: train
  valid:
    - data_src_args:
        split: valid
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    fs: 16000
    train: true
    data_aug_effects:   # no need to set the "sample_rate" argument for each effect here
        - [0.1, "contrast", {"enhancement_amount": 75.0}]
        - [0.1, "highpass", {"cutoff_freq": 5000, "Q": 0.707}]
        - [0.1, "equalization", {"center_freq": 1000, "gain": 0, "Q": 0.707}]
        - - 0.1
          - - [0.3, "speed_perturb", {"factor": 0.9}]
            - [0.3, "speed_perturb", {"factor": 1.1}]
            - [0.3, "speed_perturb", {"factor": 1.3}]
    data_aug_num: [1, 4]
    data_aug_prob: 1.0
    token_type: bpe
    token_list: ${tokenizer.save_path}/tokens.txt
    bpemodel: ${tokenizer.save_path}/bpe.model

create_dataset:
  recipe_dir: ${recipe_dir}

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
tokenizer:
  vocab_size: 30
  character_coverage: 1.0
  model_type: bpe
  save_path: ${data_dir}/${tokenizer.model_type}_${tokenizer.vocab_size}
  text_builder:
    func: src.tokenizer.gather_training_text
    manifest_path: ${data_dir}/manifest/train.tsv

##########################################################
#                      MODEL SETTING                     #
##########################################################
model:
  vocab_size: ${tokenizer.vocab_size}
  token_list: ${tokenizer.save_path}/tokens.txt

  encoder: vgg_rnn
  encoder_conf:
    num_layers: 1
    hidden_size: 2
    output_size: 2

  decoder: rnn
  decoder_conf:
    hidden_size: 2

  normalize: utterance_mvn
  normalize_conf: {}

  model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

  frontend: default
  frontend_conf:
    n_fft: 512
    win_length: 400
    hop_length: 160

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.001
  weight_decay: 0.0

override scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  mode: min
  factor: 0.5
  patience: 1

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
val_scheduler_criterion: valid/loss

best_model_criterion:
  - - valid/acc
    - 1
    - max

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  train:
    iter_factory:
      batches:
        type: sorted
        batch_size: 1
  valid:
    iter_factory:
      batches:
        type: sorted
        batch_size: 1

##########################################################
#                    TRAINER SETTING                     #
##########################################################
# These settings map to `lightning.Trainer(...)`.
trainer:
  log_every_n_steps: 1
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 1

  strategy: auto
