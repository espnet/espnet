##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/training.yaml
#   python run.py --stages train          --training_config conf/training.yaml
#
# Main stages and what this config is used for:
# - `create_dataset`: uses `create_dataset`
# - `train_tokenizer`: uses `tokenizer`
# - `collect_stats`: uses `dataset`, `dataloader`, `model`, and `parallel`
# - `train`: uses most fields in this file

##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
num_device: 1
num_nodes: 1

# Optional ESPnet task class path used by `get_espnet_model(...)`.
# If unset, `model` is instantiated directly via Hydra.
task:

# Path scaffold relative to the recipe root.
recipe_dir: .
data_dir: ${recipe_dir}/data
exp_tag: ${self_name:}
exp_dir: ${recipe_dir}/exp/${exp_tag}
stats_dir: ${recipe_dir}/exp/stats

# Directory where this recipe stores prepared manifests and any recipe-local
# dataset artifacts.
#
# In simple recipes, prefer a fixed path under the recipe root, such as
# `${recipe_dir}/dataset`, so users do not need to pass a dataset-specific
# directory override at inference time.
#
# Keep this value as the single source of truth for dataset location. Training,
# inference, and dataset creation should all reuse the same path instead of
# redefining dataset names in multiple configs.
dataset_dir: /path/to/your/dataset

##########################################################
#                 DATASET CREATION SETTING               #
##########################################################
# Optional dataset creation hook for the `create_dataset` stage.
# The function is resolved from `create_dataset.func` and called with the
# remaining fields in this block as keyword arguments.
# If your recipe builds manifests locally, write them under `${dataset_dir}` so
# later stages can consume the same files without extra path overrides.
create_dataset:
  func: src.creating_dataset.create_dataset
  dataset_dir: ${dataset_dir}

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Dataset organizer used across collect_stats/train/infer/measure.
# Fill `train`, `valid`, and optionally `test` with dataset reference entries.
#
# Each dataset entry supports:
# - `data_src`: optional dataset source reference.
#   - `<recipe>/<task>` tag, e.g. `mini_an4/asr`
#   - dotted module path, e.g. `my_project.datasets.foo`
#   - omitted: load `${recipe_dir}/dataset/__init__.py`
# - `data_src_args`: kwargs forwarded to `Dataset(...)`
# - `transform`: optional Hydra-instantiated per-sample transform applied before
#   `preprocessor`
# - `name`: mainly useful for `test`; inference uses it as the output
#   subdirectory name
#
# Only `data_src_args` is passed to the recipe `Dataset` constructor.
# Top-level fields such as `name` and `transform` stay in organizer space.
#
# Example:
# dataset:
#   _target_: espnet3.components.data.data_organizer.DataOrganizer
#   recipe_dir: ${recipe_dir}
#   train:
#     - data_src: librispeech/asr
#       data_src_args:
#         split: train_clean_100
#         data_path: ${dataset_dir}
#     - data_src_args:
#         split: train
#       transform:
#         _target_: src.transforms.normalize_text
#   valid:
#     - data_src: librispeech/asr
#       data_src_args:
#         split: dev_clean
#         data_path: ${dataset_dir}
#   test:
#     - name: eval_local
#       data_src_args:
#         split: test
#   preprocessor:
#     _target_: src.preprocess.build_preprocessor
dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  recipe_dir: ${recipe_dir}
  train:
  valid:
  test:
  preprocessor:

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
# Used by the `train_tokenizer` stage in `espnet3.systems.asr.system.ASRSystem`.
# `text_builder.func` must return either:
# - a path to a text file, or
# - an iterable of training strings
tokenizer:

##########################################################
#                      MODEL SETTING                     #
##########################################################
# Training model definition.
# If `task` is set, this block is passed to `get_espnet_model(task, model_conf)`.
# Thus, you can reuse ESPnet2-style model configs here by setting `task` and
# filling this block with the per-model config that ESPnet2 used.
# If `task` is not set, this block is instantiated directly via Hydra.
model:

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
# Single optimizer path:
optimizer:
  _target_: torch.optim.Adam
  lr: 0.002
  weight_decay: 0.000001

scheduler:
  _target_: espnet2.schedulers.warmup_lr.WarmupLR
  warmup_steps: 15000

# Used only in the single optimizer path.
scheduler_interval: step   # `step` or `epoch`
scheduler_monitor:         # e.g. `valid/loss` for monitored epoch schedulers

# Multiple-loss / multiple-optimizer path:
# optimizers:
#   generator:
#     optimizer:
#       _target_: torch.optim.Adam
#       lr: 0.0002                 # optimizer config for `generator`
#     params: generator            # substring used to select parameters
#     accum_grad_steps: 1          # number of backward passes before optimizer.step()
#     step_every_n_iters: 1        # only step on every N-th training iteration
#     gradient_clip_val: 1.0       # per-optimizer gradient clipping value
#     gradient_clip_algorithm: norm  # `norm` or `value`
#
#   discriminator:
#     optimizer:
#       _target_: torch.optim.Adam
#       lr: 0.0002                 # optimizer config for `discriminator`
#     params: discriminator        # substring used to select parameters
#     accum_grad_steps: 1          # number of backward passes before optimizer.step()
#     step_every_n_iters: 1        # only step on every N-th training iteration
#
# schedulers:
#   generator:
#     scheduler:
#       _target_: torch.optim.lr_scheduler.LinearLR
#       start_factor: 1.0          # scheduler-specific argument
#       end_factor: 0.5            # scheduler-specific argument
#       total_iters: 1000          # scheduler-specific argument
#     interval: step               # `step` schedulers run after optimizer updates
#
#   discriminator:
#     scheduler:
#       _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
#       patience: 2                # scheduler-specific argument
#       factor: 0.5                # scheduler-specific argument
#     interval: epoch              # `epoch` schedulers run in `on_train_epoch_end()`
#     monitor: valid/discriminator/loss  # required for monitored epoch schedulers
#
# Note:
# - In the multiple-optimizer path, do not use trainer-level
#   `trainer.gradient_clip_val` or `trainer.gradient_clip_algorithm`.
#   Configure clipping per optimizer as shown above.

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
# Checkpoint selection criteria passed to ESPnet3 callbacks.
# Each item is:
#   - monitor key
#   - number of best checkpoints to keep
#   - direction (`min` or `max`)
best_model_criterion:
  - - valid/loss
    - 3
    - min

# Optional random seed used by collect_stats/train.
seed:

# Extra model initialization mode forwarded to ESPnet's initializer.
# Example: xavier_uniform
init:

##########################################################
#                   PARALLELIZATION SETTING              #
##########################################################
# Parallel backend used by collect_stats/train.
parallel:
  env: local
  n_workers: 1

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  collate_fn:
    _target_: espnet2.train.collate_fn.CommonCollateFn
    int_pad_value: -1
  # Training dataloader / iterator settings.
  train:
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: true
      collate_fn: ${dataloader.collate_fn}
      batches:
        # Typical batch modes include `unsorted`, `sorted`, and task-specific
        # iterator/batcher setups. Adjust this to match your dataset.
        type: unsorted
        shape_files:
          - ${stats_dir}/train/feats_shape
        batch_size: 4
        batch_bins: 4000000

  # Validation dataloader / iterator settings.
  valid:
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: false
      collate_fn: ${dataloader.collate_fn}
      batches:
        type: ${dataloader.train.iter_factory.batches.type}
        shape_files:
          - ${stats_dir}/valid/feats_shape
        batch_size: ${dataloader.train.iter_factory.batches.batch_size}
        batch_bins: ${dataloader.train.iter_factory.batches.batch_bins}

##########################################################
#                    TRAINER SETTING                     #
##########################################################
# These settings map to `lightning.Trainer(...)`.
trainer:
  accelerator: auto
  devices: ${num_device}
  num_nodes: ${num_nodes}
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  max_epochs: 100

  logger:
    - _target_: lightning.pytorch.loggers.TensorBoardLogger
      save_dir: ${exp_dir}/tensorboard
      name: tb_logger

  strategy: auto

##########################################################
#                      FIT SETTING                       #
##########################################################
# Optional keyword arguments passed directly to `trainer.fit(**fit)`.
# Leave `{}` for the default flow.
fit: {}
