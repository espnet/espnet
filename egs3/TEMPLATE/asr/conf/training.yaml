##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/training.yaml
#   python run.py --stages train          --training_config conf/training.yaml
#
# Main stages and what this config is used for:
# - `create_dataset`: uses `create_dataset`
# - `train_tokenizer`: uses `tokenizer`
# - `collect_stats`: uses `dataset`, `dataloader`, `model`, and `parallel`
# - `train`: uses most fields in this file

##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
num_device: 1
num_nodes: 1

# Optional ESPnet task class path used by `get_espnet_model(...)`.
# If unset, `model` is instantiated directly via Hydra.
task:

# Path scaffold relative to the recipe root.
recipe_dir: .
data_dir: ${recipe_dir}/data
exp_tag:
exp_dir: ${recipe_dir}/exp/${exp_tag}
stats_dir: ${recipe_dir}/exp/stats
inference_dir: ${exp_dir}/inference
dataset_dir: /path/to/your/dataset

##########################################################
#                 DATASET CREATION SETTING               #
##########################################################
# Optional dataset creation hook for the `create_dataset` stage.
# The function is resolved from `create_dataset.func` and called with the
# remaining fields in this block as keyword arguments.
create_dataset:
  func: src.creating_dataset.create_dataset
  dataset_dir: ${dataset_dir}

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Dataset organizer used across collect_stats/train/infer/measure.
# Fill `train`, `valid`, and optionally `test` with named dataset entries.
#
# Example:
# dataset:
#   _target_: espnet3.components.data.data_organizer.DataOrganizer
#   train:
#     - name: train
#       dataset:
#         _target_: src.dataset.YourDataset
#         manifest_path: ${dataset_dir}/manifest/train.tsv
#   valid:
#     - name: dev
#       dataset:
#         _target_: src.dataset.YourDataset
#         manifest_path: ${dataset_dir}/manifest/dev.tsv
#   test:
#     - name: test
#       dataset:
#         _target_: src.dataset.YourDataset
#         manifest_path: ${dataset_dir}/manifest/test.tsv
#   preprocessor:
#     _target_: src.preprocess.build_preprocessor
dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  train:
  valid:
  test:
  preprocessor:

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
# Used by the `train_tokenizer` stage in `espnet3.systems.asr.system.ASRSystem`.
# `text_builder.func` must return either:
# - a path to a text file, or
# - an iterable of training strings
tokenizer:

##########################################################
#                      MODEL SETTING                     #
##########################################################
# Training model definition.
# If `task` is set, this block is passed to `get_espnet_model(task, model_conf)`.
# Thus, you can reuse ESPnet2-style model configs here by setting `task` and
# filling this block with the per-model config that ESPnet2 used.
# If `task` is not set, this block is instantiated directly via Hydra.
model:

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
optimizer:
  _target_: torch.optim.Adam
  lr: 0.002
  weight_decay: 0.000001

scheduler:
  _target_: espnet2.schedulers.warmup_lr.WarmupLR
  warmup_steps: 15000

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
# Checkpoint selection criteria passed to ESPnet3 callbacks.
# Each item is:
#   - monitor key
#   - number of best checkpoints to keep
#   - direction (`min` or `max`)
best_model_criterion:
  - - valid/loss
    - 3
    - min

# Optional random seed used by collect_stats/train.
seed:

# Extra model initialization mode forwarded to ESPnet's initializer.
# Example: xavier_uniform
init:

##########################################################
#                   PARALLELIZATION SETTING              #
##########################################################
# Parallel backend used by collect_stats/train.
parallel:
  env: local
  n_workers: 1

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  collate_fn:
    _target_: espnet2.train.collate_fn.CommonCollateFn
    int_pad_value: -1
  # Training dataloader / iterator settings.
  train:
    multiple_iterator: false
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: true
      collate_fn: ${dataloader.collate_fn}
      batches:
        # Typical batch modes include `unsorted`, `sorted`, and task-specific
        # iterator/batcher setups. Adjust this to match your dataset.
        type: unsorted
        shape_files:
          - ${stats_dir}/train/feats_shape
        batch_size: 4
        batch_bins: 4000000

  # Validation dataloader / iterator settings.
  valid:
    multiple_iterator: false
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: false
      collate_fn: ${dataloader.collate_fn}
      batches:
        type: ${dataloader.train.iter_factory.batches.type}
        shape_files:
          - ${stats_dir}/valid/feats_shape
        batch_size: ${dataloader.train.iter_factory.batches.batch_size}
        batch_bins: ${dataloader.train.iter_factory.batches.batch_bins}

##########################################################
#                    TRAINER SETTING                     #
##########################################################
# These settings map to `lightning.Trainer(...)`.
trainer:
  accelerator: auto
  devices: ${num_device}
  num_nodes: ${num_nodes}
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  max_epochs: 100

  logger:
    - _target_: lightning.pytorch.loggers.TensorBoardLogger
      save_dir: ${exp_dir}/tensorboard
      name: tb_logger

  strategy: auto

##########################################################
#                      FIT SETTING                       #
##########################################################
# Optional keyword arguments passed directly to `trainer.fit(**fit)`.
# Leave `{}` for the default flow.
fit: {}
