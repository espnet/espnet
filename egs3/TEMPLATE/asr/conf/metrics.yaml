##########################################################
#                 METRIC SCORING SETTING                 #
##########################################################
# Quick usage:
#   python run.py --stages measure --metrics_config conf/metrics.yaml
#
# Assumptions:
# - `conf/inference.yaml` has already produced `<test_name>/*.scp` files.
# - Each metric reads matching SCP keys such as `ref.scp` and `hyp.scp`.
# - If `dataset.test` is omitted, test sets are discovered from `${inference_dir}`
#   subdirectories.

##########################################################
#                    PATHS AND INPUTS                    #
##########################################################
recipe_dir: .
exp_tag:
exp_dir: ${recipe_dir}/exp/${exp_tag}
inference_dir: ${exp_dir}/inference


##########################################################
#                    METRIC DEFINITION                   #
##########################################################
metrics:
  - metric:
      _target_: espnet3.systems.asr.metrics.wer.WER
      ref_key: ref        # reference text key -> `<test_name>/ref.scp`
      hyp_key: hyp        # hypothesis text key -> `<test_name>/hyp.scp`
      clean_types:        # optional TextCleaner pipeline, e.g. [tacotron]

  - metric:
      _target_: espnet3.systems.asr.metrics.cer.CER
      ref_key: ref        # reference text key -> `<test_name>/ref.scp`
      hyp_key: hyp        # hypothesis text key -> `<test_name>/hyp.scp`
      clean_types:        # optional TextCleaner pipeline, e.g. [jaconv]
