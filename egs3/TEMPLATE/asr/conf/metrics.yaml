# Metric/scoring configuration template for ESPnet3 ASR.
# Consumes decode outputs under decode_dir and reports metrics.

exp_dir: ${load_yaml:conf/training.yaml,exp_dir}
inference_dir: ${exp_dir}/inference
dataset_dir: ${load_yaml:conf/training.yaml,dataset_dir}

dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  test:

metrics:
  - metric:
      _target_: espnet3.systems.asr.metrics.wer.WER
      clean_types:

  - metric:
      _target_: espnet3.systems.asr.metrics.cer.CER
      clean_types:
