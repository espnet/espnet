# Metric/scoring configuration template for ESPnet3 ASR.
# Consumes decode outputs under decode_dir and reports metrics.

# Path scaffold relative to the recipe root; keep aligned with infer.yaml.
recipe_dir: .
data_dir: ${recipe_dir}/data
exp_tag: tse_template_eval
exp_dir: ${recipe_dir}/exp/${exp_tag}
stats_dir: ${recipe_dir}/exp/stats
inference_dir: ${exp_dir}/infer
dataset_dir: /path/to/your/dataset

# Dataset definition for test splits only (used to enumerate test names).
dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  test:
    - name: 2mix_16k_max_test_mix-both
      dataset:
        _target_: src.dataset.LibriMixTSEDataset
        data_dir: ${dataset_dir}
        split: 2mix_16k_max_test_mix-both

# Metrics block intentionally empty in template; fill with WER/CER, etc.
metrics:
