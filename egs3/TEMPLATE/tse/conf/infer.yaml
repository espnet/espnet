# Inference configuration template for ESPnet3 TSE.
# exp_tag / exp_dir are injected from training_config by apply_training_experiment_context.

inference_dir: ${exp_dir}/infer

dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  test:
    - name: 2mix_16k_max_test_mix-both
      dataset:
        _target_: src.dataset.LibriMixTSEDataset
        data_dir: data/dataset
        split: 2mix_16k_max_test_mix-both
        ignore_key_prefix: ["text_spk", "num_spk"]

model:
  _target_: espnet2.bin.enh_tse_inference.SeparateSpeech
  train_config: ${exp_dir}/config.yaml
  model_file: ${exp_dir}/last.ckpt

# input_key: keys passed to the model; speech_ref1 is NOT included here.
# It is accessed inside output_fn via the full data dict for the reference output.
input_key:
  - speech_mix
  - enroll_ref1

idx_key: uttid
output_fn: src.infer.output_fn

# Write extracted speech and reference speech as WAV artifacts.
output_artifacts:
  inf:
    type: wav
    sample_rate: 16000
  ref:
    type: wav
    sample_rate: 16000

provider:
  _target_: espnet3.systems.base.inference_provider.InferenceProvider
runner:
  _target_: espnet3.systems.base.inference_runner.InferenceRunner

parallel:
  env: local
  n_workers: 1
