##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/training.yaml
#   python run.py --stages collect_stats  --training_config conf/training.yaml
#   python run.py --stages train          --training_config conf/training.yaml
#
# Main stages and what this config is used for:
# - `create_dataset`: uses `dataset` and optional `create_dataset` builder kwargs
# - `collect_stats`: uses `dataset`, `dataloader`, `model`, and `parallel`
# - `train`: uses most fields in this file

##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
num_device: 1
num_nodes: 1

# Optional ESPnet task class path used by `get_espnet_model(...)`.
# If unset, `model` is instantiated directly via Hydra.
task:

# Optional stage log mode used by the stage runner.
stage_log_mode: rank0

# Path scaffold relative to the recipe root.
recipe_dir: .
data_dir: ${recipe_dir}/data
exp_tag:
exp_dir: ${recipe_dir}/exp/${exp_tag}
stats_dir: ${exp_dir}/stats
inference_dir: ${exp_dir}/inference

##########################################################
#                 DATASET CREATION SETTING               #
##########################################################
# Optional keyword arguments forwarded to the recipe-local `DatasetBuilder`.
# When omitted, `BaseSystem.create_dataset()` still works as long as `dataset`
# points at a local or external dataset module exposing `DatasetBuilder`.
#
# Example:
# create_dataset:
#   recipe_dir: ${recipe_dir}

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# Dataset organizer used across collect_stats/train.
# Fill `train` and `valid` with dataset reference entries.
#
# Example:
# dataset:
#   _target_: espnet3.components.data.data_organizer.DataOrganizer
#   recipe_dir: ${recipe_dir}
#   train:
#     - data_src_args:
#         split: train
#   valid:
#     - data_src_args:
#         split: valid
#   preprocessor:
#     _target_: espnet2.train.preprocessor.CommonPreprocessor
#     fs: 16000
#     train: true
#     token_type: char
#     token_list: ${data_dir}/tokens.txt
dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  recipe_dir: ${recipe_dir}
  train:
  valid:
  preprocessor:

##########################################################
#                      MODEL SETTING                     #
##########################################################
# Training model definition.
# If `task` is set, this block is passed to `get_espnet_model(task, model_conf)`.
# This is the recommended path when reusing ESPnet2 TTS tasks such as:
# - `espnet2.tasks.tts.TTSTask`
# - `espnet2.tasks.gan_tts.GANTTSTask`
#
# Example:
# task: espnet2.tasks.tts.TTSTask
# model:
#   token_list: ${data_dir}/tokens.txt
#   token_type: char
#   feats_extract: fbank
#   feats_extract_conf:
#     fs: 16000
#     n_fft: 1024
#     hop_length: 256
#     n_mels: 80
#   normalize: null
#   tts: tacotron2
#   tts_conf:
#     embed_dim: 256
#
# Example GAN-TTS:
# task: espnet2.tasks.gan_tts.GANTTSTask
# model:
#   token_list: ${data_dir}/tokens.txt
#   token_type: char
#   feats_extract: fbank
#   normalize: null
#   tts: vits
#   tts_conf:
#     generator_type: vits_generator
model:

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
# Single optimizer path:
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.001
  weight_decay: 0.0

scheduler:
  _target_: torch.optim.lr_scheduler.ExponentialLR
  gamma: 0.99

# Used only in the single optimizer path.
scheduler_interval: epoch   # `step` or `epoch`
scheduler_monitor:          # e.g. `valid/loss` for monitored epoch schedulers

# Multiple-loss / multiple-optimizer path:
# optimizers:
#   generator:
#     optimizer:
#       _target_: torch.optim.AdamW
#       lr: 0.0002
#     params: generator
#     accum_grad_steps: 1
#     step_every_n_iters: 1
#     gradient_clip_val: 1.0
#     gradient_clip_algorithm: norm
#
#   discriminator:
#     optimizer:
#       _target_: torch.optim.AdamW
#       lr: 0.0002
#     params: discriminator
#     accum_grad_steps: 1
#     step_every_n_iters: 1
#
# schedulers:
#   generator:
#     scheduler:
#       _target_: torch.optim.lr_scheduler.ExponentialLR
#       gamma: 0.999
#     interval: epoch
#
#   discriminator:
#     scheduler:
#       _target_: torch.optim.lr_scheduler.ExponentialLR
#       gamma: 0.999
#     interval: epoch
#
# Note:
# - In the multiple-optimizer path, do not use trainer-level
#   `trainer.gradient_clip_val` or `trainer.gradient_clip_algorithm`.
# - For GAN-TTS tasks, leave `optimizer`, `scheduler`, and `scheduler_interval`
#   unset or null when using `optimizers` / `schedulers`.

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
# Checkpoint selection criteria passed to ESPnet3 callbacks.
# Each item is:
#   - monitor key
#   - number of best checkpoints to keep
#   - direction (`min` or `max`)
best_model_criterion:
  - - valid/loss
    - 3
    - min

# Optional random seed used by collect_stats/train.
seed:

# Extra model initialization mode forwarded to ESPnet's initializer.
# Example: xavier_uniform
init:

##########################################################
#                   PARALLELIZATION SETTING              #
##########################################################
# Parallel backend used by collect_stats/train.
parallel:
  env: local
  n_workers: 1

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  collate_fn:
    _target_: espnet2.train.collate_fn.CommonCollateFn
    int_pad_value: 0
    float_pad_value: 0.0

  # Training dataloader / iterator settings.
  train:
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: true
      collate_fn: ${dataloader.collate_fn}
      batches:
        # Adjust this to the batching rule required by your task.
        type: unsorted
        shape_files:
          - ${stats_dir}/train/feats_shape
        batch_size: 1
        batch_bins: 4000000

  # Validation dataloader / iterator settings.
  valid:
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: false
      collate_fn: ${dataloader.collate_fn}
      batches:
        type: ${dataloader.train.iter_factory.batches.type}
        shape_files:
          - ${stats_dir}/valid/feats_shape
        batch_size: ${dataloader.train.iter_factory.batches.batch_size}
        batch_bins: ${dataloader.train.iter_factory.batches.batch_bins}

##########################################################
#                    TRAINER SETTING                     #
##########################################################
# These settings map to `lightning.Trainer(...)`.
trainer:
  accelerator: auto
  devices: ${num_device}
  num_nodes: ${num_nodes}
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  max_epochs: 100

  logger:
    - _target_: lightning.pytorch.loggers.TensorBoardLogger
      save_dir: ${exp_dir}/tensorboard
      name: tb_logger

  strategy: auto

##########################################################
#                      FIT SETTING                       #
##########################################################
# Optional keyword arguments passed directly to `trainer.fit(**fit)`.
# Leave `{}` for the default flow.
fit: {}
