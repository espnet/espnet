##########################################################
#                   Inference SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages infer --inference_config conf/inference.yaml
#
# Outputs:
# - `${inference_dir}/<test_name>/*.scp`
# - each SCP stores `utt_id value` pairs for one inference field

##########################################################
#                    PATHS AND INPUTS                    #
##########################################################
recipe_dir: .
# Common case:
# - pass both `--training_config` and `--inference_config`
# - `run.py` copies `training_config.exp_tag` / `training_config.exp_dir` here
# - `${self_name:}` resolves to the stem of the config file passed to
#   `--inference_config`
# - if `inference_dir` is omitted, `conf/<name>.yaml` becomes `${exp_dir}/<name>`
# Override `inference_dir` only when you want a different output location.
exp_tag:
exp_dir: ${recipe_dir}/exp/${exp_tag}
data_dir: ${recipe_dir}/data
inference_dir: ${exp_dir}/${self_name:}

# If inference needs access to manifests under the same dataset root as
# training, define `dataset_dir` here by reusing the training config instead of
# hardcoding a dataset name again.
#
# Example:
# dataset_dir: ${recipe_dir}/data

# Test split definitions are required for inference.
# Each item in `dataset.test` is a dataset reference entry.
# - `name` becomes the output subdirectory name under `${inference_dir}`
# - `data_src` can be a `<recipe>/<task>` tag, a dotted module path, or be
#   omitted to load `${recipe_dir}/dataset/__init__.py`
# - `data_src_args` is forwarded to `Dataset(...)`
# - `transform` is optional and runs before `preprocessor`
#
# Only `data_src_args` is passed to the recipe `Dataset` constructor.
# Top-level fields such as `name` and `transform` are consumed by
# `DataOrganizer`.
#
# Example:
# dataset:
#   test:
#     - name: valid
#       data_src_args:
#         split: valid
#     - name: test
#       data_src_args:
#         split: test
dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  recipe_dir: ${recipe_dir}
  test:
  preprocessor:

##########################################################
#                  PARALLELIZATION SETTING               #
##########################################################
parallel:
  env: local
  n_workers: 1

##########################################################
#                    MODEL AND OUTPUT                    #
##########################################################
# Inference model definition.
# Typical ESPnet2-backed example:
# model:
#   _target_: espnet2.bin.tts_inference.Text2Speech
#   train_config: ${exp_dir}/config.yaml
#   model_file: ${exp_dir}/last.ckpt
model:

# Key name(s) selected from each dataset sample and passed to the model.
# TTS recipes typically use `text`, optionally alongside `spembs` for
# speaker-conditioned models.
input_key: text

# Optional output key list.
# These keys must exist in the dict returned by `output_fn`.
#
# output_keys:
#   - wav

# Sample identifier field name expected in the final inference output dict.
# Inference uses `utt_id` by default unless you override it here.
# idx_key: utt_id

# Optional batch size.
# Set to `null` if your model or `output_fn` only supports single-item decoding.
batch_size: null

# Optional recipe-provided formatter that converts raw model outputs into dicts.
# Typical TTS output:
#   {"utt_id": "...", "wav": np.ndarray}
output_fn:

# Optional artifact writers for non-scalar outputs.
# Built-in types:
#   - wav    : requires `sample_rate`
#   - npy
#   - json
#   - pickle
#
# Example:
# output_artifacts:
#   wav:
#     type: wav
#     sample_rate: 16000
output_artifacts:

##########################################################
#               PROVIDER AND RUNNER SETTING              #
##########################################################
provider:
  _target_: espnet3.systems.base.inference_provider.InferenceProvider
runner:
  _target_: espnet3.systems.base.inference_runner.InferenceRunner
