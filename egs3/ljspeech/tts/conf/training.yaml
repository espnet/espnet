exp_tag: train_vits_ljspeech
task: espnet2.tasks.gan_tts.GANTTSTask

recipe_dir: .
data_dir: ${recipe_dir}/data
exp_dir: ${recipe_dir}/exp/${exp_tag}
stats_dir: ${exp_dir}/stats
inference_dir: ${exp_dir}/inference

create_dataset:
  recipe_dir: ${recipe_dir}
  token_type: phn
  g2p_type: g2p_en_no_space

dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  recipe_dir: ${recipe_dir}
  train:
    - data_src_args:
        split: train
  valid:
    - data_src_args:
        split: dev
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    fs: 22050
    train: true
    token_type: phn
    token_list: ${data_dir}/tokens.txt
    text_cleaner:
      - tacotron
    g2p_type: g2p_en_no_space

model:
  token_list: ${data_dir}/tokens.txt
  token_type: phn
  feats_extract: linear_spectrogram
  feats_extract_conf:
    n_fft: 1024
    hop_length: 256
    win_length: null
  normalize: null
  tts: vits
  tts_conf:
    generator_type: vits_generator
    generator_params:
      hidden_channels: 192
      spks: -1
      global_channels: -1
      segment_size: 32
      text_encoder_attention_heads: 2
      text_encoder_ffn_expand: 4
      text_encoder_blocks: 6
      text_encoder_positionwise_layer_type: conv1d
      text_encoder_positionwise_conv_kernel_size: 3
      text_encoder_positional_encoding_layer_type: rel_pos
      text_encoder_self_attention_layer_type: rel_selfattn
      text_encoder_activation_type: swish
      text_encoder_normalize_before: true
      text_encoder_dropout_rate: 0.1
      text_encoder_positional_dropout_rate: 0.0
      text_encoder_attention_dropout_rate: 0.1
      use_macaron_style_in_text_encoder: true
      use_conformer_conv_in_text_encoder: false
      text_encoder_conformer_kernel_size: -1
      decoder_kernel_size: 7
      decoder_channels: 512
      decoder_upsample_scales: [8, 8, 2, 2]
      decoder_upsample_kernel_sizes: [16, 16, 4, 4]
      decoder_resblock_kernel_sizes: [3, 7, 11]
      decoder_resblock_dilations: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
      use_weight_norm_in_decoder: true
      posterior_encoder_kernel_size: 5
      posterior_encoder_layers: 16
      posterior_encoder_stacks: 1
      posterior_encoder_base_dilation: 1
      posterior_encoder_dropout_rate: 0.0
      use_weight_norm_in_posterior_encoder: true
      flow_flows: 4
      flow_kernel_size: 5
      flow_base_dilation: 1
      flow_layers: 4
      flow_dropout_rate: 0.0
      use_weight_norm_in_flow: true
      use_only_mean_in_flow: true
      stochastic_duration_predictor_kernel_size: 3
      stochastic_duration_predictor_dropout_rate: 0.5
      stochastic_duration_predictor_flows: 4
      stochastic_duration_predictor_dds_conv_layers: 3
    discriminator_type: hifigan_multi_scale_multi_period_discriminator
    discriminator_params:
      scales: 1
      scale_downsample_pooling: AvgPool1d
      scale_downsample_pooling_params:
        kernel_size: 4
        stride: 2
        padding: 2
      scale_discriminator_params:
        in_channels: 1
        out_channels: 1
        kernel_sizes: [15, 41, 5, 3]
        channels: 128
        max_downsample_channels: 1024
        max_groups: 16
        bias: true
        downsample_scales: [2, 2, 4, 4, 1]
        nonlinear_activation: LeakyReLU
        nonlinear_activation_params:
          negative_slope: 0.1
        use_weight_norm: true
        use_spectral_norm: false
      follow_official_norm: false
      periods: [2, 3, 5, 7, 11]
      period_discriminator_params:
        in_channels: 1
        out_channels: 1
        kernel_sizes: [5, 3]
        channels: 32
        downsample_scales: [3, 3, 3, 3, 1]
        max_downsample_channels: 1024
        bias: true
        nonlinear_activation: LeakyReLU
        nonlinear_activation_params:
          negative_slope: 0.1
        use_weight_norm: true
        use_spectral_norm: false
    generator_adv_loss_params:
      average_by_discriminators: false
      loss_type: mse
    discriminator_adv_loss_params:
      average_by_discriminators: false
      loss_type: mse
    feat_match_loss_params:
      average_by_discriminators: false
      average_by_layers: false
      include_final_outputs: true
    mel_loss_params:
      fs: 22050
      n_fft: 1024
      hop_length: 256
      win_length: null
      window: hann
      n_mels: 80
      fmin: 0
      fmax: null
      log_base: null
    lambda_adv: 1.0
    lambda_mel: 45.0
    lambda_feat_match: 2.0
    lambda_dur: 1.0
    lambda_kl: 1.0
    sampling_rate: 22050
    cache_generator_outputs: true
    plot_pred_mos: false
    mos_pred_tool: utmos

optimizers:
  generator:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 0.0002
      betas: [0.8, 0.99]
      eps: 1.0e-9
      weight_decay: 0.0
    params: generator
    accum_grad_steps: 1
    step_every_n_iters: 1
  discriminator:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 0.0002
      betas: [0.8, 0.99]
      eps: 1.0e-9
      weight_decay: 0.0
    params: discriminator
    accum_grad_steps: 1
    step_every_n_iters: 1

schedulers:
  generator:
    scheduler:
      _target_: torch.optim.lr_scheduler.ExponentialLR
      gamma: 0.999875
    interval: epoch
  discriminator:
    scheduler:
      _target_: torch.optim.lr_scheduler.ExponentialLR
      gamma: 0.999875
    interval: epoch

optimizer: null
scheduler: null
scheduler_interval: null

best_model_criterion:
  - - valid/generator/loss
    - 1
    - min

parallel:
  env: local
  n_workers: 1

dataloader:
  collate_fn:
    _target_: espnet2.train.collate_fn.CommonCollateFn
    int_pad_value: -1
    float_pad_value: 0.0
  train:
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: true
      collate_fn: ${dataloader.collate_fn}
      batches:
        type: numel
        shape_files:
          - ${stats_dir}/train/speech_shape
          - ${stats_dir}/train/text_shape
        batch_bins: 5000000
  valid:
    num_shards: 1
    iter_factory:
      _target_: espnet2.iterators.sequence_iter_factory.SequenceIterFactory
      shuffle: false
      collate_fn: ${dataloader.collate_fn}
      batches:
        type: ${dataloader.train.iter_factory.batches.type}
        shape_files:
          - ${stats_dir}/valid/speech_shape
          - ${stats_dir}/valid/text_shape
        batch_bins: ${dataloader.train.iter_factory.batches.batch_bins}

trainer:
  accelerator: auto
  devices: ${num_device}
  num_nodes: ${num_nodes}
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  log_every_n_steps: 50
  max_epochs: 1000
  strategy: auto
  gan:
    generator_first: false
    skip_discriminator_prob: 0.0

fit: {}
