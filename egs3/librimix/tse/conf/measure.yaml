# Metric/scoring configuration for the LibriMix TSE recipe.
# exp_tag / exp_dir / inference_dir are injected from --training_config
# (and --inference_config when present) by apply_training_experiment_context.

recipe_dir: .
data_dir: ${recipe_dir}/data
exp_tag: librimix_tse_td_speakerbeam
exp_dir: ${recipe_dir}/exp/${exp_tag}
inference_dir: ${exp_dir}/infer
dataset_dir: /path/for/storing/LibriMix

dataset:
  _target_: espnet3.components.data.data_organizer.DataOrganizer
  test:
    - name: 2mix_16k_max_test_mix-both
      dataset:
        _target_: src.dataset.LibriMixTSEDataset
        data_dir: ${dataset_dir}
        split: 2mix_16k_max_test_mix-both

metrics:
  - metric:
      _target_: espnet3.systems.tse.metrics.tsos.TSOS
      ref_key: ref
      hyp_key: inf
      batch_size: 1
      power: 2.0
      threshold: 0.1
      ref_channel: 0
      device: cpu
