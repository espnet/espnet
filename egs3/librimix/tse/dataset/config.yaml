    - 2mix_8k_min_test_mix-clean
    # ========== noisy 2-speaker mixtures (8 kHz, min mode) ==========
    - 2mix_8k_min_train-100_mix-both
    - 2mix_8k_min_train-360_mix-both
    - 2mix_8k_min_train_mix-both
