recipe_dir: .
# Publish assumes the default training entrypoint `conf/training.yaml`, which
# resolves to `exp/training` via `${self_name:}` from the TEMPLATE config.
exp_dir: ${recipe_dir}/exp/training

pack_model:
  strategy: auto  # auto|espnet2|espnet3
  out_dir: exp/model_pack
  extra: []
  exclude:
    - "**/*.log"
    - "**/tensorboard/**"
    - "**/wandb/**"
  files: {}
  yaml_files: {}
  espnet2:
    task: asr
    yaml_files:
      asr_train_config: ${exp_dir}/config.yaml
    files:
      asr_train_model: ${exp_dir}/model.pth
    option: []

upload_model:
  hf_repo: yourname/your-model-repo
