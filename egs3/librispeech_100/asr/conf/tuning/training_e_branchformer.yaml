##########################################################
#                    TRAINING SETTING                    #
##########################################################
# Quick usage:
#   python run.py --stages create_dataset --training_config conf/training.yaml
#   python run.py --stages train          --training_config conf/training.yaml
#

##########################################################
#                  SYSTEM AND PATH SETTING               #
##########################################################
# `recipe_dir`, `data_dir`, `exp_tag`, `exp_dir`, and `stats_dir` are inherited
# from the TEMPLATE config. In particular, `exp_tag` follows `${self_name:}`.
task: espnet3.systems.asr.task.ASRTask

##########################################################
#                    DATASET DEFINITION                  #
##########################################################
# This recipe uses `${recipe_dir}/dataset/__init__.py` in the same way as
# `mini_an4`, so `data_src` is omitted and only `data_src_args` is forwarded.
dataset:
  train:
    - data_src_args:
        split: train-clean-100
  valid:
    - data_src_args:
        split: dev-clean
    - data_src_args:
        split: dev-other
  preprocessor:
    _target_: espnet2.train.preprocessor.CommonPreprocessor
    train: true
    token_type: bpe
    token_list: ${tokenizer.save_path}/tokens.txt
    bpemodel: ${tokenizer.save_path}/bpe.model
    text_cleaner:
    fs: 16000
    data_aug_effects:
      - - 0.6
        - - [0.5, "speed_perturb", {"factor": 0.9}]
          - [0.5, "speed_perturb", {"factor": 1.1}]

create_dataset:
  recipe_dir: ${recipe_dir}

##########################################################
#                   TOKENIZER SETTING                    #
##########################################################
tokenizer:
  vocab_size: 5000
  character_coverage: 1.0
  model_type: bpe
  save_path: ${data_dir}/${tokenizer.model_type}_${tokenizer.vocab_size}
  text_builder:
    func: src.tokenizer.gather_training_text
    recipe_dir: ${recipe_dir}
    split: train-clean-100

##########################################################
#                      MODEL SETTING                     #
##########################################################
model:
  vocab_size: ${tokenizer.vocab_size}
  token_list: ${tokenizer.save_path}/tokens.txt

  encoder: e_branchformer
  encoder_conf:
    output_size: 256
    attention_heads: 4
    attention_layer_type: rel_selfattn
    pos_enc_layer_type: rel_pos
    rel_pos_type: latest
    cgmlp_linear_units: 1024
    cgmlp_conv_kernel: 31
    use_linear_after_conv: false
    gate_activation: identity
    num_blocks: 12
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.1
    input_layer: conv2d
    layer_drop_rate: 0.0
    linear_units: 1024
    positionwise_layer_type: linear
    use_ffn: true
    macaron_ffn: true
    merge_conv_kernel: 31

  decoder: transformer
  decoder_conf:
    attention_heads: 4
    linear_units: 2048
    num_blocks: 6
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.1
    src_attention_dropout_rate: 0.1
    layer_drop_rate: 0.0

  normalize: global_mvn
  normalize_conf:
    stats_file: ${stats_dir}/train/feats_stats.npz

  model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

  frontend: default
  frontend_conf:
    n_fft: 512
    win_length: 400
    hop_length: 160

  specaug: specaug
  specaug_conf:
    apply_time_warp: true
    time_warp_window: 5
    time_warp_mode: bicubic
    apply_freq_mask: true
    freq_mask_width_range: [0, 27]
    num_freq_mask: 2
    apply_time_mask: true
    time_mask_width_ratio_range: [0.0, 0.05]
    num_time_mask: 5

##########################################################
#            OPTIMIZER & SCHEDULER SETTING               #
##########################################################
optimizer:
  _target_: torch.optim.Adam
  lr: 0.002
  weight_decay: 0.000001

scheduler:
  _target_: espnet2.schedulers.warmup_lr.WarmupLR
  warmup_steps: 15000

##########################################################
#                OTHER TRAINING SETTING                  #
##########################################################
best_model_criterion:
  - - valid/loss
    - 3
    - min

##########################################################
#                   DATALOADER SETTING                   #
##########################################################
dataloader:
  train:
    iter_factory:
      num_workers: 4
      batches:
        type: sorted
        shape_files:
          - ${stats_dir}/train/feats_shape
        batch_size: 16
        batch_bins: 12000000
  valid:
    iter_factory:
      batches:
        type: ${dataloader.train.iter_factory.batches.type}
        shape_files:
          - ${stats_dir}/valid/feats_shape
        batch_size: ${dataloader.train.iter_factory.batches.batch_size}
        batch_bins: ${dataloader.train.iter_factory.batches.batch_bins}

##########################################################
#                    TRAINER SETTING                     #
##########################################################
trainer:
  accumulate_grad_batches: 4
  check_val_every_n_epoch: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  max_epochs: 200
  precision: bf16-mixed

  logger:
    - _target_: lightning.pytorch.loggers.TensorBoardLogger
      save_dir: ${exp_dir}/tensorboard
      name: tb_logger

  strategy: auto

fit: {}
